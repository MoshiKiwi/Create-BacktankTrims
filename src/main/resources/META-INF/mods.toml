[[mods]]
modId = "createbacktanktrims"
version = "1.1.1"
displayName = "Create: Backtank Trims"
authors = "Moshi"
description = '''
Re-enables smithing-table armor trims for Create's diving helmets, diving boots and backtanks, and renders the trims correctly on the worn equipment. Fixes Create issue #6213.'''

# Forge itself.
[[dependencies.createbacktanktrims]]
modId = "forge"
mandatory = true
versionRange = "[47,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.createbacktanktrims]]
modId = "minecraft"
mandatory = true
versionRange = "[1.20.1,1.20.2)"
ordering = "NONE"
side = "BOTH"

# Must load AFTER Create so our trimmable_armor tag additions override Create's removals.
[[dependencies.createbacktanktrims]]
modId = "create"
mandatory = true
versionRange = "[6.0.0,)"
ordering = "AFTER"
side = "BOTH"
